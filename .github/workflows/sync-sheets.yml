name: Sync Google Sheets to data.json

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build data.json
        run: |
          SHEET_ID="1Frf3JZsDYIh2roqksKlxvBDYJyvqdFazePdKP4_cQXo"
          UPDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -s "https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E9%80%B2%E8%A1%8C%E4%B8%AD%E6%A1%88%E4%BB%B6%E6%B8%85%E5%96%AE%EF%BC%88%E6%A5%AD%E5%8B%99%EF%BC%89&headers=1" -o p.csv
          curl -s "https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E9%A1%9E%E5%88%A5%E6%B8%85%E5%96%AE&headers=1" -o c.csv
          curl -s "https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E5%BB%A0%E5%95%86%E6%AD%B7%E5%8F%B2%E5%90%8D%E5%86%8A%EF%BC%88%E4%B8%AD%E6%8E%A7%EF%BC%89&headers=1" -o v.csv

          python3 << PYEOF
          import csv, json, io, os, sys

          def rows(f):
              d = open(f, encoding='utf-8').read()
              r = list(csv.reader(io.StringIO(d)))
              return r[1:] if len(r) > 1 else []

          projects = []
          for r in rows('p.csv'):
              if len(r) >= 2 and r[0].strip() and (len(r) < 3 or r[2].strip() != '結案'):
                  projects.append({'code': r[0].strip(), 'name': r[1].strip(), 'status': r[2].strip() if len(r) > 2 else '進行中'})

          cm = {}
          for r in rows('c.csv'):
              if len(r) >= 4 and r[0].strip() and r[2].strip():
                  mc = r[0].strip()
                  if mc not in cm:
                      cm[mc] = {'label': r[1].strip(), 'subs': []}
                  cm[mc]['subs'].append({'code': r[2].strip(), 'label': r[3].strip(), 'desc': r[4].strip() if len(r) > 4 else ''})

          vd = {}
          for r in rows('v.csv'):
              if len(r) < 4: continue
              t, n, g = r[2].strip(), r[3].strip(), r[4].strip() if len(r) > 4 else ''
              s = r[14].strip() if len(r) > 14 else '正常'
              if not n or not t or s == '停用': continue
              if t not in vd: vd[t] = []
              vd[t].append({'id': r[0].strip(), 'name': n, 'grade': g, 'type': r[1].strip()})

          data = {
              'projects': projects,
              'categoryMap': cm,
              'vendors': {k: vd[k] for k in sorted(vd)},
              'updatedAt': os.environ.get('UPDATED_AT', '')
          }

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"OK: {len(projects)}p {len(cm)}c {len(vd)}v")
          PYEOF

      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || (git commit -m "sync: update data.json" && git push origin HEAD:main --force)
