name: Sync Google Sheets to data.json

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Sheets data and build data.json
        run: |
          SHEET_ID="1Frf3JZsDYIh2roqksKlxvBDYJyvqdFazePdKP4_cQXo"
          
          # 抓案件清單
        curl -s "https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E9%80%B2%E8%A1%8C%E4%B8%AD%E6%A1%88%E4%BB%B6%E6%B8%85%E5%96%AE%EF%BC%88%E6%A5%AD%E5%8B%99%EF%BC%89&headers=1" -o projects_raw.csv
          
          # 抓類別清單
          curl -s "https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E9%A1%9E%E5%88%A5%E6%B8%85%E5%96%AE&headers=1" -o categories_raw.csv
          
          # 抓廠商歷史名冊（中控）
          curl -s "https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E5%BB%A0%E5%95%86%E6%AD%B7%E5%8F%B2%E5%90%8D%E5%86%8A%EF%BC%88%E4%B8%AD%E6%8E%A7%EF%BC%89&headers=1" -o vendors_raw.csv
          
          # 抓更新時間
          UPDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          python3 << PYEOF
          import csv, json, io, os

          def parse_csv(filename):
              try:
                  with open(filename, 'r', encoding='utf-8') as f:
                      content = f.read()
                  reader = csv.reader(io.StringIO(content))
                  rows = list(reader)
                  return rows[1:] if len(rows) > 1 else []
              except Exception as e:
                  print(f"Error reading {filename}: {e}")
                  return []

          # 解析案件
          proj_rows = parse_csv('projects_raw.csv')
          projects = []
          for r in proj_rows:
              if len(r) >= 2 and r[0].strip():
                  status = r[2].strip() if len(r) > 2 else '進行中'
                  if status != '結案':
                      projects.append({
                          'code': r[0].strip(),
                          'name': r[1].strip(),
                          'status': status
                      })

          # 解析類別
          cat_rows = parse_csv('categories_raw.csv')
          category_map = {}
          for r in cat_rows:
              if len(r) >= 4 and r[0].strip() and r[2].strip():
                  main_code = r[0].strip()
                  main_name = r[1].strip()
                  sub_code  = r[2].strip()
                  sub_name  = r[3].strip()
                  desc      = r[4].strip() if len(r) > 4 else ''
                  if main_code not in category_map:
                      category_map[main_code] = {'label': main_name, 'subs': []}
                  category_map[main_code]['subs'].append({
                      'code':  sub_code,
                      'label': sub_name,
                      'desc':  desc
                  })

          # 解析廠商歷史名冊
          # 欄位：A廠商ID, B廠商類型, C工種, D廠商名稱, E評級,
          #       F地區, G統編, H聯絡人, I電話, J地址, K備註,
          #       L Drive連結, M建立日期, N最後更新, O狀態
          vendor_rows = parse_csv('vendors_raw.csv')
          vendors = {}

          for r in vendor_rows:
              if len(r) < 4:
                  continue
              vendor_id   = r[0].strip() if len(r) > 0 else ''
              vendor_type = r[1].strip() if len(r) > 1 else ''
              trade       = r[2].strip() if len(r) > 2 else ''
              name        = r[3].strip() if len(r) > 3 else ''
              grade       = r[4].strip() if len(r) > 4 else ''
              status      = r[14].strip() if len(r) > 14 else '正常'

              if not name or not trade or status == '停用':
                  continue

              if trade not in vendors:
                  vendors[trade] = []

              vendors[trade].append({
                  'id':    vendor_id,
                  'name':  name,
                  'grade': grade,
                  'type':  vendor_type
              })

          vendors_sorted = {k: vendors[k] for k in sorted(vendors.keys())}

          updated_at = os.environ.get('UPDATED_AT', '')

          data = {
              'projects':    projects,
              'categoryMap': category_map,
              'vendors':     vendors_sorted,
              'updatedAt':   updated_at
          }

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"✓ 完成：{len(projects)} 個案件，{len(category_map)} 個大類，{len(vendors_sorted)} 個工種")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto sync: update data.json from Google Sheets"
            git push
          fi
